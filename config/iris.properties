# Iris Shaders 配置 — TFARCENIM 整合包默认值
# 适配 Iris 1.8.x / Minecraft 1.21.10

# 是否启用光影（true）。若机器较弱可设为 false，仍保留 Sodium 渲染加速。
enableShaders=true

# 默认光影包（需已放入 shaderpacks/ 目录）。留空表示不预设。
# 推荐 Cyanide Shaders（极低负载）。填入 zip 文件名（不含路径）。
shaderPack=

# 光影质量
maxShadowRenderDistance=32
renderDistance=0
shouldRenderClouds=true
shouldRenderSodiumTerrain=true

# 调试与兼容
enableDebugOverlay=false
alwaysSetupTerrainCore=false

# 物理光源（关闭以提升性能）
enableBlockDamageOverlay=true

# 显存限制（MB，0=自动）
maxGpuMemoryMB=0
