# Just Enough Items (JEI) 配置 — TFARCENIM 整合包默认值
# 适配 JEI 19.x / Minecraft 1.21.10
# 设计要求：JEI 始终显示全部配方（与 REI 并存，互不冲突）。

# 调试
debug=false

# 配方显示
showRecipeCatalysts=true

# 不在物品列表中隐藏任何物品（TFARCENIM 需要玩家能看到全部配方以了解改动）
hideSingleCategory=false

# 背包按钮
giveMode=INVENTORY

# 搜索模式
searchMode=DEFAULT

# 默认排序
modNameSorted=false
