# Roughly Enough Items (REI) 配置 — TFARCENIM 整合包默认值
# 适配 REI 16.x / Minecraft 1.21.10
# 设计要求：REI 默认开启，且提供醒目开关（由 tfarcenim-core 集成）。

# 是否启用 REI 显示（默认开启）
cheating=false
enableRei=true

# 配方查看模式：显示所有配方（与 JEI 一致）
arrayDisplay=DEFAULT

# 边栏位置
leftSidePanel=true
showRecipeCheating=false

# 列表显示
inventoryCheating=false
entrySize=25

# 搜索
searchFieldLocation=TOP

# 按键绑定（默认）
keyBindingRecipeLookup=r
keyBindingUsage=u
keyBindingHide=o

# 不隐藏任何配方分类（TFARCENIM 配方书阶段由 tfarcenim-recipebook 单独控制）
filteringOptions=SHOW_CRAFTABLE
